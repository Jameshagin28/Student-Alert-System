<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students - Lecturer Panel</title>
    <link rel="stylesheet" href="../css/lecturer.css">
</head>
<body>
    <div class="lecturer-layout">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <h2>🎓 Lecturer Panel</h2>
                <p id="lecturerName">Loading...</p>
            </div>
            
            <ul class="sidebar-menu">
                <li><a href="dashboard.html">📊 Dashboard</a></li>
                <li><a href="courses.html">📚 Courses</a></li>
                <li><a href="students.html" class="active">👨‍🎓 Students</a></li>
                <li><a href="alerts.html">🚨 Alerts</a></li>
                <li><a href="#" onclick="logout()">🚪 Logout</a></li>
            </ul>
        </nav>
        
        <!-- Main Content -->
        <main class="main-content">
            <header class="content-header">
                <h1>Students</h1>
                <div class="header-actions">
                    <select id="courseFilter" onchange="filterStudents()">
                        <option value="">All Courses</option>
                    </select>
                    <input type="text" id="searchInput" placeholder="Search students..." onkeyup="filterStudents()">
                </div>
            </header>
            
            <!-- Students Table -->
            <div class="table-container">
                <div class="table-header">
                    <h3>Students List</h3>
                    <div class="table-actions">
                        <button class="btn-primary" onclick="openSendAlertModal()">📢 Send Alert</button>
                    </div>
                </div>
                
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>
                                <input type="checkbox" id="selectAll" onchange="toggleSelectAll()">
                            </th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Course</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="studentsTableBody">
                        <tr>
                            <td colspan="5" class="loading">Loading students...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
    
    <!-- Send Alert Modal -->
    <div id="sendAlertModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>📢 Send Alert to Students</h3>
                <button class="modal-close" onclick="closeSendAlertModal()">&times;</button>
            </div>
            
            <form id="alertForm" class="modal-form">
                <div class="form-group">
                    <label for="alertSubject">Subject *</label>
                    <input type="text" id="alertSubject" name="subject" required>
                </div>
                
                <div class="form-group">
                    <label for="recipientType">Send To *</label>
                    <select id="recipientType" name="recipientType" required onchange="toggleCourseSelect()">
                        <option value="selected">Selected Students</option>
                        <option value="course">Entire Course</option>
                    </select>
                </div>
                
                <div class="form-group" id="courseSelectGroup" style="display: none;">
                    <label for="courseSelect">Course *</label>
                    <select id="courseSelect" name="courseId">
                        <option value="">Select Course</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="alertMessage">Message *</label>
                    <textarea id="alertMessage" name="message" required rows="6"></textarea>
                </div>
                
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeSendAlertModal()">Cancel</button>
                    <button type="submit" class="btn-primary">Send Alert</button>
                </div>
            </form>
        </div>
    </div>
    
    <script src="../js/lecturer.js"></script>
    <script>
        let allStudents = [];
        let allCourses = [];
        let selectedStudents = [];
        
        document.addEventListener('DOMContentLoaded', async () => {
            await loadData();
        });
        
        async function loadData() {
            try {
                // Get lecturer ID from stored user data
                const user = JSON.parse(localStorage.getItem('user'));
                const lecturerId = user.id;
                
                // Load courses
                const coursesResponse = await apiCall(`/users/lecturer/${lecturerId}/courses`);
                allCourses = coursesResponse.courses || [];
                
                // Populate course filter dropdown
                populateCourseDropdowns(allCourses);
                
                // Load students (in a real app, this would be an API call)
                // For now, we'll use placeholder data
                await loadStudents();
            } catch (error) {
                console.error('Failed to load data:', error);
                showNotification('Failed to load data', 'error');
            }
        }
        
        function populateCourseDropdowns(courses) {
            // Populate course filter
            const courseFilter = document.getElementById('courseFilter');
            courseFilter.innerHTML = '<option value="">All Courses</option>' +
                courses.map(course => `<option value="${course.id}">${course.name} (${course.code})</option>`).join('');
            
            // Populate course select in alert modal
            const courseSelect = document.getElementById('courseSelect');
            courseSelect.innerHTML = '<option value="">Select Course</option>' +
                courses.map(course => `<option value="${course.id}">${course.name} (${course.code})</option>`).join('');
        }
        
        async function loadStudents() {
            const tableBody = document.getElementById('studentsTableBody');
            tableBody.innerHTML = '<tr><td colspan="5" class="loading">Loading students...</td></tr>';
            
            try {
                // Get lecturer ID from stored user data
                const user = JSON.parse(localStorage.getItem('user'));
                const lecturerId = user.id;
                
                // Load students for all courses
                const students = [];
                for (const course of allCourses) {
                    const response = await apiCall(`/users/course/${course.id}/students`);
                    const courseStudents = response.students || [];
                    
                    // Add course info to each student
                    courseStudents.forEach(student => {
                        students.push({
                            ...student,
                            courseId: course.id,
                            courseName: course.name,
                            courseCode: course.code
                        });
                    });
                }
                
                allStudents = students;
                displayStudents(allStudents);
            } catch (error) {
                console.error('Failed to load students:', error);
                tableBody.innerHTML = '<tr><td colspan="5" class="error">Failed to load students</td></tr>';
            }
        }
        
        function displayStudents(students) {
            const tableBody = document.getElementById('studentsTableBody');
            
            if (students.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="5" class="empty-state">No students found</td></tr>';
                return;
            }
            
            tableBody.innerHTML = students.map(student => `
                <tr>
                    <td>
                        <input type="checkbox" class="student-checkbox" value="${student.id}" onchange="updateSelectedStudents()">
                    </td>
                    <td>${student.name}</td>
                    <td>${student.email}</td>
                    <td>${student.courseCode} - ${student.courseName}</td>
                    <td>
                        <button class="btn-icon" onclick="sendIndividualAlert(${student.id})" title="Send Alert">📧</button>
                    </td>
                </tr>
            `).join('');
        }
        
        function filterStudents() {
            const courseId = document.getElementById('courseFilter').value;
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            let filteredStudents = [...allStudents];
            
            // Filter by course
            if (courseId) {
                filteredStudents = filteredStudents.filter(student => student.courseId == courseId);
            }
            
            // Filter by search term
            if (searchTerm) {
                filteredStudents = filteredStudents.filter(student => 
                    student.name.toLowerCase().includes(searchTerm) || 
                    student.email.toLowerCase().includes(searchTerm)
                );
            }
            
            displayStudents(filteredStudents);
            
            // Reset select all checkbox
            document.getElementById('selectAll').checked = false;
            selectedStudents = [];
        }
        
        function toggleSelectAll() {
            const isChecked = document.getElementById('selectAll').checked;
            const checkboxes = document.querySelectorAll('.student-checkbox');
            
            checkboxes.forEach(checkbox => {
                checkbox.checked = isChecked;
            });
            
            updateSelectedStudents();
        }
        
        function updateSelectedStudents() {
            const checkboxes = document.querySelectorAll('.student-checkbox:checked');
            selectedStudents = Array.from(checkboxes).map(cb => parseInt(cb.value));
        }
        
        function openSendAlertModal() {
            if (selectedStudents.length === 0) {
                showNotification('Please select at least one student', 'error');
                return;
            }
            
            document.getElementById('alertForm').reset();
            document.getElementById('courseSelectGroup').style.display = 'none';
            document.getElementById('sendAlertModal').style.display = 'flex';
        }
        
        function closeSendAlertModal() {
            document.getElementById('sendAlertModal').style.display = 'none';
        }
        
        function toggleCourseSelect() {
            const recipientType = document.getElementById('recipientType').value;
            const courseGroup = document.getElementById('courseSelectGroup');
            
            if (recipientType === 'course') {
                courseGroup.style.display = 'block';
            } else {
                courseGroup.style.display = 'none';
            }
        }
        
        function sendIndividualAlert(studentId) {
            // Clear previous selections
            selectedStudents = [studentId];
            
            // Check the corresponding checkbox
            const checkboxes = document.querySelectorAll('.student-checkbox');
            checkboxes.forEach(cb => {
                cb.checked = cb.value == studentId;
            });
            
            // Open the alert modal
            openSendAlertModal();
        }
        
        // Handle alert form submission
        document.getElementById('alertForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const subject = document.getElementById('alertSubject').value;
            const message = document.getElementById('alertMessage').value;
            const recipientType = document.getElementById('recipientType').value;
            
            let courseId = null;
            if (recipientType === 'course') {
                courseId = document.getElementById('courseSelect').value;
                if (!courseId) {
                    showNotification('Please select a course', 'error');
                    return;
                }
            }
            
            try {
                // In a real app, this would send the alert via API
                // For now, we'll just show a success message
                
                if (recipientType === 'course') {
                    await apiCall('/alerts/send', 'POST', {
                        subject,
                        message,
                        recipientType: 'course',
                        courseId
                    });
                } else {
                    // This would be a custom endpoint in a real app
                    // For now, we'll simulate success
                    await new Promise(resolve => setTimeout(resolve, 1000));
                }
                
                showNotification('Alert sent successfully', 'success');
                closeSendAlertModal();
            } catch (error) {
                showNotification('Failed to send alert: ' + error.message, 'error');
            }
        });
        
        // Close modal when clicking outside
        window.addEventListener('click', (e) => {
            if (e.target.classList.contains('modal')) {
                e.target.style.display = 'none';
            }
        });
    </script>
</body>
</html>
