<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses Management - Student Alert System</title>
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <div class="admin-layout">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <h2>🎓 Admin Panel</h2>
                <p id="adminName">Loading...</p>
            </div>
            
            <ul class="sidebar-menu">
                <li><a href="dashboard.html">📊 Dashboard</a></li>
                <li><a href="users.html">👥 Users</a></li>
                <li><a href="courses.html" class="active">📚 Courses</a></li>
                <li><a href="alerts.html">🚨 Alerts</a></li>
                <li><a href="events.html">📅 Events</a></li>
                <li><a href="#" onclick="logout()">🚪 Logout</a></li>
            </ul>
        </nav>
        
        <!-- Main Content -->
        <main class="main-content">
            <header class="content-header">
                <h1>Courses Management</h1>
                <button class="btn-primary" onclick="showAddCourseModal()">Add New Course</button>
            </header>
            
            <!-- Course List -->
            <div class="content-card">
                <div class="card-header">
                    <h3>📚 All Courses</h3>
                    <div class="search-box">
                        <input type="text" id="courseSearch" placeholder="Search courses...">
                        <button class="btn-secondary" onclick="searchCourses()">Search</button>
                    </div>
                </div>
                
                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Course Code</th>
                                <th>Course Name</th>
                                <th>Lecturer</th>
                                <th>Students</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="coursesTableBody">
                            <tr>
                                <td colspan="6" class="loading">Loading courses...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Add Course Modal -->
    <div id="addCourseModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add New Course</h2>
                <span class="close" onclick="closeAddCourseModal()">&times;</span>
            </div>
            <form id="addCourseForm" onsubmit="handleAddCourse(event)">
                <div class="form-group">
                    <label for="courseCode">Course Code</label>
                    <input type="text" id="courseCode" required>
                </div>
                <div class="form-group">
                    <label for="courseName">Course Name</label>
                    <input type="text" id="courseName" required>
                </div>
                <div class="form-group">
                    <label for="department">Department</label>
                    <select id="department" required>
                        <option value="">Select Department</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="lecturer">Lecturer</label>
                    <select id="lecturer">
                        <option value="">Select Lecturer</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" rows="3"></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-secondary" onclick="closeAddCourseModal()">Cancel</button>
                    <button type="submit" class="btn-primary">Add Course</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Edit Course Modal -->
    <div id="editCourseModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit Course</h2>
                <span class="close" onclick="closeEditCourseModal()">&times;</span>
            </div>
            <form id="editCourseForm" onsubmit="handleEditCourse(event)">
                <input type="hidden" id="editCourseId">
                <div class="form-group">
                    <label for="editCourseCode">Course Code</label>
                    <input type="text" id="editCourseCode" required>
                </div>
                <div class="form-group">
                    <label for="editCourseName">Course Name</label>
                    <input type="text" id="editCourseName" required>
                </div>
                <div class="form-group">
                    <label for="editDepartment">Department</label>
                    <select id="editDepartment" required>
                        <option value="">Select Department</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="editLecturer">Lecturer</label>
                    <select id="editLecturer">
                        <option value="">Select Lecturer</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="editDescription">Description</label>
                    <textarea id="editDescription" rows="3"></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-secondary" onclick="closeEditCourseModal()">Cancel</button>
                    <button type="submit" class="btn-primary">Update Course</button>
                </div>
            </form>
        </div>
    </div>
    
    <script src="../js/admin.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await loadCourses()
            await loadLecturers()
            await loadDepartments()
        })

        async function loadCourses() {
            try {
                const response = await apiCall('/events/courses')
                const courses = response.courses || []
                
                const tableBody = document.getElementById('coursesTableBody')
                if (courses.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="6" class="empty-state">No courses found</td></tr>'
                    return
                }

                tableBody.innerHTML = courses.map(course => `
                    <tr>
                        <td>${course.code}</td>
                        <td>${course.name}</td>
                        <td>${course.lecturer_name || 'Unassigned'}</td>
                        <td>${course.student_count || 0}</td>
                        <td><span class="status-badge ${(course.status || 'active').toLowerCase()}">${course.status || 'Active'}</span></td>
                        <td>
                            <button class="btn-icon" onclick="editCourse('${course.id}')">✏️</button>
                            <button class="btn-icon" onclick="deleteCourse('${course.id}')">🗑️</button>
                        </td>
                    </tr>
                `).join('')
            } catch (error) {
                console.error('Failed to load courses:', error)
                document.getElementById('coursesTableBody').innerHTML = 
                    '<tr><td colspan="6" class="error-state">Failed to load courses</td></tr>'
            }
        }

        async function loadLecturers() {
            try {
                const response = await apiCall('/users/lecturer')
                const lecturers = response.users || []
                const select = document.getElementById('lecturer')
                const editSelect = document.getElementById('editLecturer')
                
                const options = '<option value="">Select Lecturer</option>' +
                    lecturers.map(lecturer => 
                        `<option value="${lecturer.id}">${lecturer.name}</option>`
                    ).join('')
                
                select.innerHTML = options
                editSelect.innerHTML = options
            } catch (error) {
                console.error('Failed to load lecturers:', error)
            }
        }

        async function loadDepartments() {
            try {
                const response = await apiCall('/events/departments')
                const departments = response.departments || []
                const select = document.getElementById('department')
                const editSelect = document.getElementById('editDepartment')
                
                const options = '<option value="">Select Department</option>' +
                    departments.map(dept => 
                        `<option value="${dept.id}">${dept.name}</option>`
                    ).join('')
                
                select.innerHTML = options
                editSelect.innerHTML = options
            } catch (error) {
                console.error('Failed to load departments:', error)
                showNotification('Failed to load departments', 'error')
            }
        }

        function showAddCourseModal() {
            document.getElementById('addCourseModal').style.display = 'block'
        }

        function closeAddCourseModal() {
            document.getElementById('addCourseModal').style.display = 'none'
            document.getElementById('addCourseForm').reset()
        }

        function showEditCourseModal() {
            document.getElementById('editCourseModal').style.display = 'block'
        }

        function closeEditCourseModal() {
            document.getElementById('editCourseModal').style.display = 'none'
            document.getElementById('editCourseForm').reset()
        }

        async function handleAddCourse(event) {
            event.preventDefault()
            
            const courseData = {
                code: document.getElementById('courseCode').value,
                name: document.getElementById('courseName').value,
                department_id: document.getElementById('department').value,
                lecturer_id: document.getElementById('lecturer').value || null,
                description: document.getElementById('description').value
            }

            try {
                const response = await apiCall('/events/courses', 'POST', courseData)
                showNotification('Course added successfully', 'success')
                closeAddCourseModal()
                await loadCourses()
            } catch (error) {
                console.error('Failed to add course:', error)
                showNotification(error.message || 'Failed to add course. Please try again.', 'error')
            }
        }

        async function editCourse(courseId) {
            try {
                const response = await apiCall(`/events/courses/${courseId}`)
                const course = response.course

                document.getElementById('editCourseId').value = course.id
                document.getElementById('editCourseCode').value = course.code
                document.getElementById('editCourseName').value = course.name
                document.getElementById('editDepartment').value = course.department_id
                document.getElementById('editLecturer').value = course.lecturer_id || ''
                document.getElementById('editDescription').value = course.description || ''

                showEditCourseModal()
            } catch (error) {
                console.error('Failed to load course details:', error)
                showNotification('Failed to load course details', 'error')
            }
        }

        async function handleEditCourse(event) {
            event.preventDefault()
            
            const courseId = document.getElementById('editCourseId').value
            const courseData = {
                code: document.getElementById('editCourseCode').value,
                name: document.getElementById('editCourseName').value,
                department_id: document.getElementById('editDepartment').value,
                lecturer_id: document.getElementById('editLecturer').value || null,
                description: document.getElementById('editDescription').value
            }

            try {
                await apiCall(`/events/courses/${courseId}`, 'PUT', courseData)
                showNotification('Course updated successfully', 'success')
                closeEditCourseModal()
                await loadCourses()
            } catch (error) {
                console.error('Failed to update course:', error)
                showNotification(error.message || 'Failed to update course. Please try again.', 'error')
            }
        }

        async function deleteCourse(courseId) {
            if (!confirm('Are you sure you want to delete this course? This action cannot be undone.')) {
                return
            }

            try {
                await apiCall(`/events/courses/${courseId}`, 'DELETE')
                showNotification('Course deleted successfully', 'success')
                await loadCourses()
            } catch (error) {
                console.error('Failed to delete course:', error)
                showNotification(error.message || 'Failed to delete course. Please try again.', 'error')
            }
        }

        function searchCourses() {
            const searchTerm = document.getElementById('courseSearch').value.toLowerCase()
            const rows = document.querySelectorAll('#coursesTableBody tr')
            
            rows.forEach(row => {
                const text = row.textContent.toLowerCase()
                row.style.display = text.includes(searchTerm) ? '' : 'none'
            })
        }
    </script>
</body>
</html>
